services:
  - type: web
    name: grievance-backend
    runtime: node
    rootDir: "grivence_AI/smart cities and ttansport/grievance-mern/backend"
    buildCommand: "cd ../frontend && npm install && npm run build && cd ../backend && npm install"
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
